---
apiVersion: v1
kind: Namespace
metadata:
  name: test-v2-clowdappref-tls
spec:
  finalizers:
  - kubernetes
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-v2-clowdappref-tls
spec:
  targetNamespace: test-v2-clowdappref-tls
  providers:
    web:
      port: 8000
      privatePort: 10000
      mode: local
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
    featureFlags:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
# Remote dependency (ClowdAppRef)
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdAppRef
metadata:
  name: rbac
  namespace: test-v2-clowdappref-tls
spec:
  envName: test-v2-clowdappref-tls
  remoteEnvironment:
    name: production
    port: 8000
    tls:
      port: 8443
  deployments:
    - name: service
      hostname: rbac.external-cluster.example.com
      webServices:
        public:
          enabled: true
          tls: true
  serves:
    - consumer
---
# Consumer app
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: consumer
  namespace: test-v2-clowdappref-tls
spec:
  envName: test-v2-clowdappref-tls
  dependencies:
    - rbac
  deployments:
    - name: api
      podSpec:
        image: quay.io/psav/clowder-hello
