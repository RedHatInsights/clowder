---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-dependency-endpoints-v2
spec:
  targetNamespace: test-dependency-endpoints-v2
  providers:
    web:
      port: 8000
      privatePort: 10000
      h2cPort: 9800
      h2cPrivatePort: 10800
      mode: operator
      tls:
        enabled: true
        port: 8443
        privatePort: 10443
        h2cPort: 9443
        h2cPrivatePort: 10843
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: app-provider
  namespace: test-dependency-endpoints-v2
spec:
  envName: test-dependency-endpoints-v2
  deployments:
  - name: service
    podSpec:
      image: quay.io/redhat-services-prod/hcm-eng-prod-tenant/clowder-e2e:c4e7d1b
    webServices:
      public:
        enabled: true
        h2cEnabled: true
      private:
        enabled: true
        h2cEnabled: true
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: app-consumer
  namespace: test-dependency-endpoints-v2
spec:
  envName: test-dependency-endpoints-v2
  dependencies:
    - app-provider
  deployments:
  - name: processor
    podSpec:
      image: quay.io/redhat-services-prod/hcm-eng-prod-tenant/clowder-e2e:c4e7d1b
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-provider-service-cert
  namespace: test-dependency-endpoints-v2
spec:
  dnsNames:
  - app-provider-service.test-dependency-endpoints-v2.svc
  - app-provider-service.test-dependency-endpoints-v2.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: app-provider-service-serving-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: test-dependency-endpoints-v2
spec:
  selfSigned: {}
---
apiVersion: v1
data:
  service-ca.crt: test-ca
kind: ConfigMap
metadata:
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
  name: openshift-service-ca.crt
  namespace: test-dependency-endpoints-v2
