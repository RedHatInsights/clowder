---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
collectors:
- type: command
  command: bash ../_common/collect-events.sh
  timeout: 10
---
# Verify app deployment has NO tls-ca volume
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-system-api
  namespace: test-ca-system-trust
spec:
  template:
    spec:
      volumes:
      - name: config-secret
      - name: caddy-config
      - name: caddy-tls
---
# Verify dependency deployment has NO tls-ca volume
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-dep-system-worker
  namespace: test-ca-system-trust
spec:
  template:
    spec:
      volumes:
      - name: config-secret
      - name: caddy-config
      - name: caddy-tls
