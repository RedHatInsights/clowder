---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-ca-bundle
spec:
  targetNamespace: test-ca-bundle
  providers:
    web:
      port: 8000
      mode: operator
      tls:
        enabled: true
        port: 8443
        privatePort: 10443
        certificateAuthorities:
          - name: custom-ca-1
            namespace: cert-store
          - name: custom-ca-2
            namespace: cert-store
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-app-bundle
  namespace: test-ca-bundle
spec:
  envName: test-ca-bundle
  tlsCertificateAuthorityName: custom-ca-1
  deployments:
  - name: api
    podSpec:
      image: quay.io/cloudservices/insights-puptoo:1cde2bd
    webServices:
      public:
        enabled: true
  dependencies:
  - test-dep-bundle
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-dep-bundle
  namespace: test-ca-bundle
spec:
  envName: test-ca-bundle
  tlsCertificateAuthorityName: custom-ca-2
  deployments:
  - name: worker
    podSpec:
      image: quay.io/cloudservices/insights-puptoo:1cde2bd
    webServices:
      public:
        enabled: true
