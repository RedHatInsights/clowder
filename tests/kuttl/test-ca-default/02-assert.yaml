---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
collectors:
- type: command
  command: bash ../_common/collect-events.sh
  timeout: 10
---
# Verify deployment has ConfigMap volume for default CA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-default-api
  namespace: test-ca-default
spec:
  template:
    spec:
      volumes:
      - name: tls-ca
        configMap:
          name: openshift-service-ca.crt
---
# Verify no CA secret hash annotation (ConfigMap scenario)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-default-api
  namespace: test-ca-default
spec:
  template:
    metadata:
      annotations:
        configHash: "?*"
status:
  readyReplicas: 1
---
# Verify dependency deployment also uses default CA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-dep-default-worker
  namespace: test-ca-default
spec:
  template:
    spec:
      volumes:
      - name: tls-ca
        configMap:
          name: openshift-service-ca.crt
status:
  readyReplicas: 1
