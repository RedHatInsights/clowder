---
apiVersion: v1
kind: Namespace
metadata:
  name: test-ca-default
spec:
  finalizers:
  - kubernetes
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-ca-default
spec:
  targetNamespace: test-ca-default
  providers:
    web:
      port: 8000
      mode: operator
      tls:
        enabled: true
        port: 8443
        privatePort: 10443
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-app-default
  namespace: test-ca-default
spec:
  envName: test-ca-default
  deployments:
  - name: api
    podSpec:
      image: quay.io/cloudservices/insights-puptoo:1cde2bd
    webServices:
      public:
        enabled: true
  dependencies:
  - test-dep-default
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-dep-default
  namespace: test-ca-default
spec:
  envName: test-ca-default
  deployments:
  - name: worker
    podSpec:
      image: quay.io/cloudservices/insights-puptoo:1cde2bd
    webServices:
      public:
        enabled: true
