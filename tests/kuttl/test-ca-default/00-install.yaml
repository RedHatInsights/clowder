---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-ca-default
spec:
  targetNamespace: test-ca-default
  providers:
    web:
      port: 8000
      mode: operator
      tls:
        enabled: true
        port: 8443
        privatePort: 10443
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: test-ca-default
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-app-default-api-cert
  namespace: test-ca-default
spec:
  dnsNames:
  - test-app-default-api.test-ca-default.svc
  - test-app-default-api.test-ca-default.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: test-app-default-api-serving-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-dep-default-worker-cert
  namespace: test-ca-default
spec:
  dnsNames:
  - test-dep-default-worker.test-ca-default.svc
  - test-dep-default-worker.test-ca-default.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: test-dep-default-worker-serving-cert
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-app-default
  namespace: test-ca-default
spec:
  envName: test-ca-default
  deployments:
  - name: api
    podSpec:
      image: quay.io/psav/clowder-hello
    webServices:
      public:
        enabled: true
  dependencies:
  - test-dep-default
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-dep-default
  namespace: test-ca-default
spec:
  envName: test-ca-default
  deployments:
  - name: worker
    podSpec:
      image: quay.io/psav/clowder-hello
    webServices:
      public:
        enabled: true
