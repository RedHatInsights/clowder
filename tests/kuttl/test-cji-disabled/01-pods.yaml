---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-cji-disabled
spec:
  targetNamespace: test-cji-disabled
  providers:
    web:
      port: 8000
      mode: operator
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
    featureFlags:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: puptoo
  namespace: test-cji-disabled
spec:
  envName: test-cji-disabled
  deployments:
    - name: processor
      podSpec:
        image: quay.io/redhat-services-prod/hcm-eng-prod-tenant/clowder-e2e:c4e7d1b
  jobs:
    - name: hello-cji
      podSpec:
        image: busybox
        args:
        - /bin/sh
        - -c
        - echo "Hello!"
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdJobInvocation
metadata:
  name: runner-cji-disabled
  namespace: test-cji-disabled
spec:
  appName: puptoo
  disabled: true
  jobs:
    - hello-cji
