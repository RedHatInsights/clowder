---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-cyndi-local-db
spec:
  targetNamespace: test-cyndi-local-db
  providers:
    web:
      port: 8000
      mode: operator
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none 
    db:
      mode: local
    logging:
      mode: none
    objectStore:
      mode: none 
    inMemoryDb:
      mode: redis
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: app-a
  namespace: test-cyndi-local-db
spec:
  envName: test-cyndi-local-db
  cyndi:
    enabled: true
    appName: app-name-override
    insights: true
  deployments:
  - name: processor
    podSpec:
      image: quay.io/redhat-services-prod/hcm-eng-prod-tenant/clowder-e2e
  database:
    name: app-a-db
    version: 12
  inMemoryDb: true
