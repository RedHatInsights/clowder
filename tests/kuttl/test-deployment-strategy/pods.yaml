---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: puptoo
  namespace: test-deployment-strategy
spec:
  envName: test-deployment-strategy
  deployments:
  - name: processor
    podSpec:
      image: quay.io/redhat-services-prod/hcm-eng-prod-tenant/clowder-e2e
    webServices:
      public:
        enabled: true
    deploymentStrategy:
      privateStrategy: Recreate
