---
apiVersion: v1
kind: Namespace
metadata:
  name: test-v2-clowdapp-plaintext
spec:
  finalizers:
  - kubernetes
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-v2-clowdapp-plaintext
spec:
  targetNamespace: test-v2-clowdapp-plaintext
  providers:
    web:
      port: 8000
      privatePort: 10000
      mode: local  # No TLS
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
    featureFlags:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
# Dependency app (RBAC)
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: rbac
  namespace: test-v2-clowdapp-plaintext
spec:
  envName: test-v2-clowdapp-plaintext
  deployments:
    - name: service
      podSpec:
        image: quay.io/psav/clowder-hello
      webServices:
        public:
          enabled: true
---
# Consumer app
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: consumer
  namespace: test-v2-clowdapp-plaintext
spec:
  envName: test-v2-clowdapp-plaintext
  dependencies:
    - rbac
  deployments:
    - name: api
      podSpec:
        image: quay.io/psav/clowder-hello
