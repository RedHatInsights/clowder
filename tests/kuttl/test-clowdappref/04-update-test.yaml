---
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    # Update the ClowdAppRef to change the hostname
    kubectl patch clowdappref remote-service -n test-clowdappref --type='json' -p='[
      {"op": "replace", "path": "/spec/deployments/0/hostname", "value": "auth-updated.remote-cluster.example.com"},
      {"op": "add", "path": "/spec/deployments/-", "value": {"name": "new-service", "hostname": "new.remote-cluster.example.com", "port": 8080, "web": true, "webServices": {"public": {"enabled": true}}, "apiPath": "/api/new/"}}
    ]'
    
    echo "Updated ClowdAppRef"
- script: |
    # Wait for the ClowdApp to be reconciled
    sleep 10
    
    # Check that the updated config contains the new hostname
    kubectl get secret consumer-app -n test-clowdappref -o jsonpath='{.data.cdappconfig\.json}' | base64 -d > /tmp/updated-config.json
    echo "Updated config:"
    cat /tmp/updated-config.json
    
    # Verify the updated hostname is present
    grep -q "auth-updated.remote-cluster.example.com" /tmp/updated-config.json
    grep -q "new.remote-cluster.example.com" /tmp/updated-config.json
    
    echo "✅ Configuration updated after ClowdAppRef change"
---
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    # Test ClowdAppRef status update
    kubectl patch clowdappref remote-service -n test-clowdappref --type='json' -p='[
      {"op": "replace", "path": "/status/ready", "value": true}
    ]' --subresource=status
    
    # Verify the status is updated
    kubectl get clowdappref remote-service -n test-clowdappref -o jsonpath='{.status.ready}' | grep -q "true"
    
    echo "✅ ClowdAppRef status can be updated" 