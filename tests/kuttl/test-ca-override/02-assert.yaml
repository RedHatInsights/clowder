---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
collectors:
- type: command
  command: bash ../_common/collect-events.sh
  timeout: 10
---
# Verify override app mounts its own secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-override-api
  namespace: test-ca-override
spec:
  template:
    spec:
      volumes:
      - name: tls-ca
        secret:
          secretName: my-team-certs
    metadata:
      annotations:
        clowder/ca-secret-hash: "?*"
        configHash: "?*"
status:
  readyReplicas: 1
---
# Verify dependency app mounts bundle secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-dep-override-worker
  namespace: test-ca-override
spec:
  template:
    spec:
      volumes:
      - name: tls-ca
        secret:
          secretName: test-ca-override-ca-bundle
    metadata:
      annotations:
        clowder/ca-secret-hash: "?*"
        configHash: "?*"
status:
  readyReplicas: 1
