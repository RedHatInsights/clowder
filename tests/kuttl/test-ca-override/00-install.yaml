---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdEnvironment
metadata:
  name: test-ca-override
spec:
  targetNamespace: test-ca-override
  providers:
    web:
      port: 8000
      mode: operator
      tls:
        enabled: true
        port: 8443
        privatePort: 10443
        certificateAuthorities:
          - name: custom-ca-1
            namespace: cert-store
    metrics:
      port: 9000
      mode: operator
      path: "/metrics"
    kafka:
      mode: none
    db:
      mode: none
    logging:
      mode: none
    objectStore:
      mode: none
    inMemoryDb:
      mode: none
  resourceDefaults:
    limits:
      cpu: 400m
      memory: 1024Mi
    requests:
      cpu: 30m
      memory: 512Mi
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-app-override
  namespace: test-ca-override
spec:
  envName: test-ca-override
  tlsCertificateAuthoritySecretRef:
    name: my-team-certs
  deployments:
  - name: api
    podSpec:
      image: quay.io/cloudservices/insights-puptoo:1cde2bd
    webServices:
      public:
        enabled: true
  dependencies:
  - test-dep-override
---
apiVersion: cloud.redhat.com/v1alpha1
kind: ClowdApp
metadata:
  name: test-dep-override
  namespace: test-ca-override
spec:
  envName: test-ca-override
  tlsCertificateAuthorityName: custom-ca-1
  deployments:
  - name: worker
    podSpec:
      image: quay.io/cloudservices/insights-puptoo:1cde2bd
    webServices:
      public:
        enabled: true
